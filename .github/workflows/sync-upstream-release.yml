name: Sync Upstream Release

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-latest-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch fork and upstream
        run: |
          git remote add upstream https://github.com/HKUDS/Vibe-Trading.git
          git fetch origin main
          git fetch upstream main

      - name: Resolve latest upstream release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/HKUDS/Vibe-Trading/releases/latest > release.json
          TAG=$(jq -r .tag_name release.json)
          NAME=$(jq -r .name release.json)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Fetch latest upstream release tag
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          git fetch upstream "refs/tags/$TAG:refs/tags/upstream-$TAG"

      - name: Check whether fork already contains the release
        id: check
        run: |
          TAG="upstream-${{ steps.release.outputs.tag }}"
          if git merge-base --is-ancestor "refs/tags/$TAG" origin/main; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create sync branch
        if: steps.check.outputs.needed == 'true'
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          BRANCH="sync-release-$TAG"
          git checkout -B "$BRANCH" origin/main
          git merge --no-edit "refs/tags/upstream-$TAG"
          git push --force-with-lease origin "$BRANCH"

      - name: Create or update sync pull request
        if: steps.check.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          BRANCH="sync-release-$TAG"
          PR_NUMBER=$(gh pr list \
            --repo "${{ github.repository }}" \
            --base main \
            --head "$BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -z "$PR_NUMBER" ]; then
            gh pr create \
              --repo "${{ github.repository }}" \
              --base main \
              --head "$BRANCH" \
              --title "Sync upstream release $TAG" \
              --body "Automated sync of upstream release \`${TAG}\` from \`HKUDS/Vibe-Trading\`."
            PR_NUMBER=$(gh pr list \
              --repo "${{ github.repository }}" \
              --base main \
              --head "$BRANCH" \
              --state open \
              --json number \
              --jq '.[0].number // empty')
          fi

          gh pr merge "$PR_NUMBER" --auto --merge
